<div class="dropdown collab-notification" data-collab-notifications>
  <button
    class="btn collab-icon-button"
    type="button"
    id="collabNotificationDropdown"
    data-bs-toggle="dropdown"
    data-bs-auto-close="outside"
    aria-expanded="false"
    aria-label="Notifications"
  >
    <span aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M12 4a4 4 0 00-4 4v2.4c0 1.2-.4 2.3-1.1 3.2L5.8 15h12.4l-1.1-1.4a5.3 5.3 0 01-1.1-3.2V8a4 4 0 00-4-4z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"></path>
        <path d="M10 18a2.2 2.2 0 004 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"></path>
      </svg>
    </span>
    <span class="collab-badge" data-collab-notification-badge hidden>0</span>
  </button>
  <div class="dropdown-menu dropdown-menu-end collab-dropdown-panel" aria-labelledby="collabNotificationDropdown">
    <div class="collab-dropdown-panel__header">
      <strong>Notifications</strong>
      <button type="button" class="btn btn-link p-0 collab-inline-link" data-mark-all-notifications>Mark all read</button>
    </div>
    <div class="collab-dropdown-panel__body" data-collab-notification-list>
      <div class="collab-empty-state">No notifications yet.</div>
    </div>
  </div>
</div>
