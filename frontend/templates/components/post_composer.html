{% import 'macros/ui_illustrations.html' as icons %}
{% if can_create_posts %}
<section class="feed-card feed-composer-card" aria-label="Create post">
  <div class="feed-composer-card__row">
    <img class="feed-avatar-image" src="{{ feed_profile.avatar_url }}" alt="{{ feed_profile.name }}">
    <button
      type="button"
      class="feed-composer-card__trigger"
      data-feed-open-modal
      data-bs-toggle="modal"
      data-bs-target="#feedPostModal"
    >
      Start a post...
    </button>
  </div>
</section>

<div class="modal fade" id="feedPostModal" tabindex="-1" aria-labelledby="feedPostModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content feed-modal">
      <form id="feedComposerForm" method="post" action="{{ url_for('create_feed_post') }}" enctype="multipart/form-data">
        <input type="hidden" name="current_filter" value="{{ selected_filter|default('all') }}">
        {% if feed_post_next_url is defined and feed_post_next_url %}
        <input type="hidden" name="next" value="{{ feed_post_next_url }}">
        {% endif %}
        <div class="modal-header feed-modal__header">
          <div class="feed-modal__author">
            <img class="feed-avatar-image" src="{{ feed_profile.avatar_url }}" alt="{{ feed_profile.name }}">
            <div>
              <h3 id="feedPostModalLabel" class="feed-modal__name">{{ feed_profile.name }}</h3>
              <p class="feed-modal__meta">{{ feed_profile.title }} &middot; {{ feed_profile.company_name }}</p>
            </div>
          </div>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>

        <div class="modal-body feed-modal__body">
          <div class="feed-field">
            <label for="feedPostType">Post type</label>
            <select id="feedPostType" name="post_type" class="form-select">
              {% for post_type in feed_post_types %}
              <option value="{{ post_type }}">{{ post_type.title() }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="feed-field">
            <label for="feedPostContent">Share with your team</label>
            <textarea id="feedPostContent" name="content" class="form-control" placeholder="What do you want to share?"></textarea>
          </div>

          <div class="feed-field">
            <label for="feedReportTitle">Report title (used for PDF/Word uploads)</label>
            <input id="feedReportTitle" name="report_title" type="text" class="form-control" placeholder="Optional report title">
          </div>

          <div class="feed-modal__actions">
            <label class="feed-upload-chip" for="feedImageInput">
              {{ icons.icon("image", 18, "small-icon") }}
              <span>Image</span>
            </label>
            <input id="feedImageInput" name="image_file" type="file" accept="image/*" hidden>

            <label class="feed-upload-chip" for="feedVideoInput">
              {{ icons.icon("video", 18, "small-icon") }}
              <span>Video</span>
            </label>
            <input id="feedVideoInput" name="video_file" type="file" accept="video/*" hidden>

            <label class="feed-upload-chip" for="feedFileInput">
              {{ icons.icon("attachment", 18, "small-icon") }}
              <span>File</span>
            </label>
            <input id="feedFileInput" name="report_file" type="file" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.csv,.txt" hidden>
          </div>

          <div id="feedMediaPreview" class="feed-modal__preview" hidden></div>
          <p id="feedFileName" class="feed-modal__file-name" hidden></p>
        </div>

        <div class="modal-footer feed-modal__footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Post</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endif %}
