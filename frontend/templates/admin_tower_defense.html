{% extends "base.html" %}

{% block title %}Admin • Tower Defense{% endblock %}

{% block content %}
<div class="container-fluid py-3">
  <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
    <div>
      <h2 class="h5 mb-0">Neon Grid TD</h2>
      <p class="text-muted small mb-0">Retro tower defense — runs in-page below (saves levels in your browser).</p>
    </div>
  </div>
  <iframe
    title="Neon Grid TD"
    class="rounded border w-100 shadow-sm"
    style="min-height: 780px; height: calc(100vh - 200px); background: #0a0d12;"
    src="{{ url_for('static', filename='tower_defense/index.html') }}"
    loading="lazy"
    referrerpolicy="same-origin"
  ></iframe>
</div>
{% endblock %}
