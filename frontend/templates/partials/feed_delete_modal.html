<div class="modal fade feed-delete-modal" id="feedDeletePostModal" tabindex="-1" aria-labelledby="feedDeletePostModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content feed-modal feed-delete-modal__content">
      <div class="modal-header feed-modal__header">
        <div>
          <p class="feed-delete-modal__eyebrow mb-1">Delete post</p>
          <h3 id="feedDeletePostModalLabel" class="feed-modal__name mb-0">Are you sure you want to delete this post?</h3>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body feed-modal__body">
        <p class="feed-delete-modal__copy mb-0">This action cannot be undone.</p>
      </div>
      <div class="modal-footer feed-modal__footer">
        <button type="button" class="btn btn-ghost feed-delete-modal__cancel" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-danger feed-delete-modal__confirm" data-feed-post-delete-confirm>
          <span class="feed-delete-modal__confirm-idle">Delete post</span>
          <span class="feed-delete-modal__confirm-busy" hidden>Deleting...</span>
        </button>
      </div>
    </div>
  </div>
</div>
